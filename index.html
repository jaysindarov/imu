<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Our Earth</title>
  <link rel="icon" type="image/jpeg" href="img/earth.jpg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="globe"></div>

  <!-- Control panel -->
  <aside class="panel" id="panel">
    <header class="panel-header">
      <h1><img class="logo" src="img/earth.jpg" alt="Earth" /> Explore Our Earth</h1>
      <p class="subtitle">Interactive globe of global living data</p>
      <button class="panel-close" id="panelClose" aria-label="Hide panel" title="Hide panel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </header>

    <nav class="modes">
      <button class="mode-btn active" data-mode="countries">
        <span class="mode-icon">🗺️</span>
        <span class="mode-text">
          <strong>Countries</strong>
          <small>Borders &amp; territories</small>
        </span>
      </button>
      <button class="mode-btn" data-mode="salaries">
        <span class="mode-icon">💰</span>
        <span class="mode-text">
          <strong>City Salaries</strong>
          <small>Avg net salary towers</small>
        </span>
      </button>
      <button class="mode-btn" data-mode="crime">
        <span class="mode-icon">🛡️</span>
        <span class="mode-text">
          <strong>Safety / Crime</strong>
          <small>Homicide rate per 100k</small>
        </span>
      </button>
      <button class="mode-btn" data-mode="cost">
        <span class="mode-icon">🛒</span>
        <span class="mode-text">
          <strong>Living Cost</strong>
          <small>Monthly cost index</small>
        </span>
      </button>
    </nav>

    <div class="legend" id="legend"></div>

    <div class="ranking" id="ranking"></div>

    <footer class="panel-footer">
      <label class="toggle">
        <input type="checkbox" id="rotateToggle" checked />
        <span>Auto-rotate</span>
      </label>
      <p class="source" id="source"></p>
    </footer>
  </aside>

  <!-- Floating button to reopen the panel -->
  <button class="panel-fab" id="panelOpen" aria-label="Show panel" title="Show panel">
    <img src="img/earth.jpg" alt="" />
  </button>

  <!-- Loading overlay -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p id="loaderText">Loading globe…</p>
  </div>

  <script src="https://unpkg.com/globe.gl@2.34.5/dist/globe.gl.min.js"></script>
  <script src="js/cities-data.js"></script>
  <script src="js/cost-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
